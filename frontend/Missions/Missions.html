<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AquaWing - Mission Control</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="/missions-page.css?v=4">
</head>
<body>
    <main class="missions-root">
        <div class="missions-layout">
            <section class="mission-side">
                <div class="mission-control-buttons">
                    <button id="start-flight-btn" class="mission-btn btn-success">START FLIGHT</button>
                    <button id="pause-mission-btn" class="mission-btn btn-warning">PAUSE</button>
                    <button id="resume-mission-btn" class="mission-btn btn-success">RESUME</button>
                    <button id="preflight-btn" class="mission-btn btn-preflight">PRE-FLIGHT CHECK</button>
                    <button id="emergency-rtl-btn" class="mission-btn btn-warning">EMERGENCY RTL</button>
                    <button id="wait-btn" class="mission-btn btn-danger">END MISSION</button>
                    <button id="clear-waypoints-btn" class="mission-btn btn-clear">CLEAR WAYPOINTS</button>
                </div>

                <div id="preflight-status" class="preflight-status" aria-live="polite" aria-atomic="true" style="display:none;">
                    <div class="status-item"><span class="component">Main Battery</span><span class="status wait">WAIT</span></div>
                    <div class="status-item"><span class="component">Motors</span><span class="status wait">WAIT</span></div>
                    <div class="status-item"><span class="component">Sensors</span><span class="status wait">WAIT</span></div>
                </div>
            </section>

            <section class="mission-map-wrap">
                <div class="mission-map-controls">
                    <button id="mission-follow-toggle" class="mission-map-btn">Follow: ON</button>
                    <button id="mission-center-btn" class="mission-map-btn">Center</button>
                    <button id="mission-clear-track-btn" class="mission-map-btn">Clear Track</button>
                    <button id="mission-waypoints-toggle" class="mission-map-btn">Waypoints: ON</button>
                </div>
                <div id="mission-map" class="mission-map" aria-label="Mission map"></div>
            </section>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/missions-page.js?v=6"></script>
</body>
</html>
