<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AquaWing - Systems</title>
    <link rel="stylesheet" href="/systems-page.css">
</head>
<body>
    <main class="systems-content">
        <div class="systems-section">
            <div class="systems-section-title">Power / Electrical</div>
            <div class="systems-metrics">
                <div class="systems-metric"><div class="systems-label">Battery Voltage</div><div class="systems-value">12.6 V</div></div>
                <div class="systems-metric"><div class="systems-label">Battery Current</div><div class="systems-value">0.0 A</div></div>
                <div class="systems-metric"><div class="systems-label">Power</div><div class="systems-value">0 W</div></div>
                <div class="systems-metric"><div class="systems-label">Bus Voltage</div><div class="systems-value">12.6 V</div></div>
                <div class="systems-metric"><div class="systems-label">Battery Temp</div><div class="systems-value">30°C</div></div>
            </div>
        </div>

        <div class="systems-section">
            <div class="systems-section-title">Motors</div>
            <div class="systems-motors-grid">
                <div class="systems-motor-card"><div class="motor-label">Motor 1</div><div class="motor-status">OK</div><div class="motor-temp">45°C</div></div>
                <div class="systems-motor-card"><div class="motor-label">Motor 2</div><div class="motor-status">OK</div><div class="motor-temp">45°C</div></div>
                <div class="systems-motor-card"><div class="motor-label">Motor 3</div><div class="motor-status">OK</div><div class="motor-temp">45°C</div></div>
            </div>
        </div>

        <div class="systems-section">
            <div class="systems-section-title">Sensors</div>
            <div class="systems-metrics">
                <div class="systems-metric"><div class="systems-label">IMU</div><div class="systems-value status-normal">OK</div></div>
                <div class="systems-metric"><div class="systems-label">GPS</div><div class="systems-value status-normal">FIX</div></div>
                <div class="systems-metric"><div class="systems-label">Barometer</div><div class="systems-value">1013 hPa</div></div>
                <div class="systems-metric"><div class="systems-label">Compass</div><div class="systems-value status-normal">OK</div></div>
            </div>
        </div>
    </main>

    <script src="/systems-page.js"></script>
</body>
</html>
