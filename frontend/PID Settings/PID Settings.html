<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AquaWing - PID Settings</title>
    <link rel="stylesheet" href="/pid-page.css">
</head>
<body>
    <main class="pid-root">
        <div class="pid-grid">
            <section class="pid-card">
                <h3>ROLL PID</h3>
                <label>P <input type="number" id="pid-roll-p" step="0.01"></label>
                <label>I <input type="number" id="pid-roll-i" step="0.01"></label>
                <label>D <input type="number" id="pid-roll-d" step="0.01"></label>
            </section>
            <section class="pid-card">
                <h3>PITCH PID</h3>
                <label>P <input type="number" id="pid-pitch-p" step="0.01"></label>
                <label>I <input type="number" id="pid-pitch-i" step="0.01"></label>
                <label>D <input type="number" id="pid-pitch-d" step="0.01"></label>
            </section>
            <section class="pid-card">
                <h3>YAW PID</h3>
                <label>P <input type="number" id="pid-yaw-p" step="0.01"></label>
                <label>I <input type="number" id="pid-yaw-i" step="0.01"></label>
                <label>D <input type="number" id="pid-yaw-d" step="0.01"></label>
            </section>
        </div>

        <section class="pid-card pid-alt">
            <h3>ALTITUDE PID</h3>
            <div class="pid-alt-grid">
                <label>P <input type="number" id="pid-alt-p" step="0.01"></label>
                <label>I <input type="number" id="pid-alt-i" step="0.01"></label>
                <label>D <input type="number" id="pid-alt-d" step="0.01"></label>
            </div>
        </section>

        <div class="pid-actions">
            <button id="pid-apply-btn" class="btn-primary">Apply Settings</button>
            <button id="pid-reset-btn" class="btn-ghost">Reset to Default</button>
            <button id="pid-save-btn" class="btn-primary">Save Profile</button>
        </div>
    </main>
    <script src="/pid-page.js"></script>
</body>
</html>
